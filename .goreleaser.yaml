# GoReleaser v2 — builds cross-platform binaries, publishes a GitHub Release,
# and updates the Homebrew tap. Triggered by CI on a pushed `v*` tag.
# Validate locally with: goreleaser check
#
# This branch (homebrew-support) adds the Homebrew tap channel on top of main.
# See HOMEBREW.md for how to finish setup and merge it into main.
version: 2

project_name: gpm

before:
  hooks:
    - go mod tidy

builds:
  - id: gpm
    main: .
    binary: gpm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Version is baked into the cmd package so `gpm version` / self-update see
    # the exact release tag.
    ldflags:
      - -s -w -X github.com/parichit13/gpm/cmd.Version={{ .Tag }}

archives:
  # Ship raw binaries named gpm_<os>_<arch> — what install.sh and `gpm update`
  # download directly (no tarball to extract).
  - id: gpm
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: parichit13
    name: gpm
  draft: false
  prerelease: auto

brews:
  - name: gpm
    repository:
      owner: parichit13
      name: homebrew-tap
      branch: main
      # A PAT with write access to the tap repo (set as a CI secret).
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/parichit13/gpm"
    description: "Zero-downtime process manager for Go services"
    license: "MIT"
    # We ship raw binaries, so install whatever single binary was downloaded.
    install: |
      bin.install Dir["gpm*"].first => "gpm"
    test: |
      system "#{bin}/gpm", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
